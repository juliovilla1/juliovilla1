<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julio Villa | Relatos</title>
    <style>
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 50px 10%;
            transition: background 0.5s, color 0.5s;
        }

        header {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin: 0; font-size: 1.5rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .post {
            position: relative;
            overflow: hidden;
            background: #f0f0f0;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .post img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: transform 0.6s ease, filter 0.6s ease;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            padding: 20px;
            text-align: center;
        }

        .post:hover img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        .post:hover .overlay {
            opacity: 1;
        }

        .dark-mode-btn {
            background: none;
            border: 1px solid #000;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        body.dark {
            background-color: #000000;
            color: #ffffff;
        }
        body.dark header { border-color: #333; }
        body.dark .dark-mode-btn { border-color: #fff; color: #fff; }
        body.dark .post { border-color: #222; }
    </style>
</head>
<body>

<header>
    <h1>JULIO VILLA</h1>
    <button class="dark-mode-btn" onclick="document.body.classList.toggle('dark')">Modo Oscuro</button>
</header>

<main class="grid">
    <div class="post">
        <img src="https://images.unsplash.com/photo-1474933166144-1d74eb70a230?q=80&w=1000&auto=format&fit=crop" alt="Relato 1">
        <div class="overlay">
            <h3>Primer Relato</h3>
            <p>Esta es la sinopsis que aparece sobre la imagen cuando pasas el mouse. Un diseño limpio y sin distracciones.</p>
        </div>
    </div>

    <div class="post">
        <img src="https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1000&auto=format&fit=crop" alt="Relato 2">
        <div class="overlay">
            <h3>Historia de Diseño</h3>
            <p>Aquí puedes colocar una breve descripción de tus trabajos o cuentos favoritos.</p>
        </div>
    </div>
</main>

</body>
</html>
